version: '3.8'

services:
  # Motor de Alta Performance (Redis)
  redis:
    image: redis:7.2-alpine
    container_name: url_shortener_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Motor Histórico e Persistente (MongoDB)
  mongodb:
    image: mongo:7.0
    container_name: url_shortener_mongodb
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  redis_data:
  mongo_data:
